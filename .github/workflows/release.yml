name: release

# Publishes the per-arch `tf` binaries as GitHub Release assets so the plugin can lazy-download
# them (hooks/tf-hook.sh) instead of committing binaries to the repo. Triggered by a `v*` tag.
# Asset names use the `uname` style the shim resolves: tf-<uname-m>-<uname-s>.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: tf-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: tf-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: tf-x86_64-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: tf-arm64-darwin   # macOS `uname -m` is `arm64`
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}
      - name: install cross (linux musl targets)
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: build
        run: |
          if [[ "${{ matrix.target }}" == *linux-musl ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: stage asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tf" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: assemble + publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: |
          cd dist
          chmod +x tf-*
          sha256sum tf-* > SHA256SUMS
          echo "── SHA256SUMS ──"; cat SHA256SUMS
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Per-arch \`tf\` binaries for the scheduler plugin, lazy-downloaded + checksum-verified by hooks/tf-hook.sh. Verify locally with \`sha256sum -c SHA256SUMS\`."
