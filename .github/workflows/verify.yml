name: verify

# The CI gate for token-fairness. Two proofs of correctness plus the marketplace invariant:
#   1. cargo test            — self-contained frozen-vector conformance (no bash needed)
#   2. tests/conformance.sh  — byte-for-byte differential vs the pinned bash oracle
#   3. verify-prereqs.sh     — single-plugin marketplace soundness (manifests, bin↔build parity)
# and it cross-compiles the per-arch binaries the plugin ships under plugins/scheduler/bin/.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: cargo test + fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      # Lean (hook) build: the default feature set hooks actually run.
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      # Full build: the dashboard + MCP surfaces ship in the released binary, so CI must lint and
      # test them too — a bare `cargo test` leaves all feature-gated code (the dashboard server,
      # the MCP handlers) unexercised, which is how a stub facade once slipped through.
      - run: cargo clippy --all-targets -p tf-cli --features mcp,dashboard -- -D warnings
      - run: cargo test -p tf-cli --features mcp,dashboard

  coverage:
    name: llvm-cov (ratcheting toward 100%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      # The OS-exec adapters (the real `claude -p` spawn, the real crontab pipe) cannot run in CI;
      # their LOGIC is unit-tested with fakes and the thin adapters are excluded by path. The
      # threshold ratchets up as the remaining per-module unit tests land (target: 100%).
      - run: cargo llvm-cov --fail-under-lines 83 --ignore-filename-regex 'offpeak_run\.rs'
      # The differential gate needs jq + the bash oracle. The oracle is pinned by SHA in
      # conformance.sh; CI checks it out beside this repo. (Skipped if the oracle is unavailable.)
      - name: differential conformance (best-effort)
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          cargo build
          if git clone --depth 50 https://github.com/whatbirdisthat/idea-to-production /tmp/i2p 2>/dev/null; then
            ( cd /tmp/i2p && git checkout 0b46ff35cb746ad14ac165431f93dcb613b517a8 2>/dev/null || true )
            BASH_DIR=/tmp/i2p/plugins/concierge/scheduler TF="$PWD/target/debug/tf" bash tests/conformance.sh
          else
            echo "::warning::bash oracle unavailable — skipped the differential gate (cargo frozen vectors still ran)"
          fi

  marketplace:
    name: single-plugin marketplace invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: sudo apt-get update && sudo apt-get install -y jq
      # The host binary the verify script smoke-tests — full-featured, matching the released asset.
      - run: cargo build --release -p tf-cli --features mcp,dashboard
      - run: |
          ARCH=$(uname -m); mkdir -p plugins/scheduler/bin
          cp target/release/tf "plugins/scheduler/bin/tf-${ARCH}-linux"
      - run: bash scripts/verify-prereqs.sh

  cross-build:
    name: cross-compile per-arch binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl   # static linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}
      # The linux-musl targets need a cross linker — `cross` supplies it in a container (the bare
      # `cargo build` failed aarch64 with `collect2: ld returned 1`). macOS targets build natively.
      - name: install cross (linux musl targets)
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      # Full-featured, byte-for-byte the same flags release.yml ships with (parity).
      - name: build
        run: |
          if [[ "${{ matrix.target }}" == *linux-musl ]]; then
            cross build --release -p tf-cli --features mcp,dashboard --target ${{ matrix.target }}
          else
            cargo build --release -p tf-cli --features mcp,dashboard --target ${{ matrix.target }}
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: tf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/tf
